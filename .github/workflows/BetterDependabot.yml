name: BetterDependabot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Update [root]
        run: |
          cd ${{ github.workspace }}
          pnpm update
        continue-on-error: true

      - name: Update [research]
        run: |
          cd ${{ github.workspace }}/research
          pnpm update
        continue-on-error: true

      - name: Update [tests]
        run: |
          cd ${{ github.workspace }}/tests
          pnpm update
        continue-on-error: true

      - name: Update [patcher]
        run: |
          cd ${{ github.workspace }}/patcher
          pnpm update
        continue-on-error: true

      - name: Update [lib]
        run: |
          cd ${{ github.workspace }}/lib
          pnpm update
        continue-on-error: true

      - name: Update [patcher/tests]
        run: |
          cd ${{ github.workspace }}/patcher/tests
          pnpm update
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update dependencies" || echo "No changes"

      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - "alexey-max-fedorov"
    commit-message:
      prefix: "[patcher]"

  - package-ecosystem: "npm"
    directory: "/lib"
    schedule:
      interval: "daily"
    assignees:
      - "alexey-max-fedorov"
    commit-message:
      prefix: "[lib]"

  - package-ecosystem: "npm"
    directory: "/patcher/tests"
    schedule:
      interval: "daily"
    assignees:
      - "alexey-max-fedorov"

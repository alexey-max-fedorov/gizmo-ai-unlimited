version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - "alexey-max-fedorov"
    commit-message:
      prefix: "[root]"

  - package-ecosystem: "npm"
    directory: "/research"
    schedule:
      interval: "daily"
    assignees:
      - "alexey-max-fedorov"
    commit-message:
      prefix: "[research]"

  - package-ecosystem: "npm"
    directory: "/tests"
    schedule:
      interval: "daily"
    assignees:
      - "alexey-max-fedorov"
    commit-message:
      prefix: "[tests]"

  - package-ecosystem: "npm"
    directory: "/patcher"
    schedule:
